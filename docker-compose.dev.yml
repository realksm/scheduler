version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: schedulerflow_db
    environment:
      POSTGRES_USER: schedulerflow
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: schedulerflow
    ports:
      - "5433:5432"        # Remove network_mode: host, keep this
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedulerflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scheduleflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: