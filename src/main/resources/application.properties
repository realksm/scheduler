spring.application.name=scheduler

# Server
server.port=1234

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/schedulerflow
spring.datasource.username=${DB_USERNAME:schedulerflow}
spring.datasource.password=${DB_PASSWORD:dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# JOOQ
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET:schedulerflow-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:1800000}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# OAuth2 Configuration - handled by OAuth2ClientConfig (conditionally enabled)
# Uncomment and provide credentials to enable OAuth2 providers:
# export GOOGLE_CLIENT_ID=xxx
# export GOOGLE_CLIENT_SECRET=xxx
# export MICROSOFT_CLIENT_ID=xxx
# export MICROSOFT_CLIENT_SECRET=xxx
# export GITHUB_CLIENT_ID=xxx
# export GITHUB_CLIENT_SECRET=xxx

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# Logging
logging.level.root=INFO
logging.level.com.schd.scheduler=INFO
logging.level.org.jooq=WARN

# HATEOAS
# spring.hateoas.use-hal-as-default-json-media-type=true